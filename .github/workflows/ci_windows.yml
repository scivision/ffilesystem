name: ci_windows

on:
  push:
    paths:
      - "**.c"
      - "**.h"
      - "**.cpp"
      - "**.f90"
      - "**.F90"
      - "**/CMakeLists.txt"
      - "**.cmake"
      - ".github/workflows/ci_windows.yml"
      - "!memcheck.cmake"
  workflow_dispatch:

jobs:

  msvc:
    runs-on: windows-2025-vs2026
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        cpp: [false, true]

    # github actions generally broken for shared lib, even when exe in cwd

    steps:
    - &checkout
      uses: actions/checkout@v6

    - name: Configure
      run: >-
        cmake --preset msvc
        -Dffilesystem_cpp:BOOL=${{ matrix.cpp }}

    - name: build Release
      run: cmake --workflow msvc

    - name: Install Release
      run: cmake --install build-msvc --config Release

    - name: example configure
      run: cmake --workflow msvc
      working-directory: example

  msys2:
    runs-on: windows-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        cpp: [false, true]
        compiler: [ { ccname: "gcc", cc: "gcc", cxx: "g++", fcname: "gcc-fortran", fc: "gfortran" },]
                 #   { ccname: "clang", cc: "clang", cxx: "clang++", fcname: "flang", fc: "flang" } ]

      # github actions generally broken for shared lib, even when exe in cwd
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
      FC: ${{ matrix.compiler.fc }}

    steps:
    - uses: msys2/setup-msys2@v2
      id: msys2
      with:
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-${{ matrix.compiler.ccname }}
          mingw-w64-ucrt-x86_64-${{ matrix.compiler.fcname }}

    - name: Put MSYS2_MinGW64 on PATH
      run: echo "${{ steps.msys2.outputs.msys2-location }}/ucrt64/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - *checkout

    - name: config cpp=${{ matrix.cpp }}
      run: cmake --preset default -Dffilesystem_cpp:BOOL=${{ matrix.cpp }}

    - name: Upload log failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: cpp-${{ matrix.cpp }}-shared-${{ runner.os }}-CMakeConfigureLog.yaml
        path: build/CMakeFiles/CMakeConfigureLog.yaml

    - name: Debug workflow
      run: cmake --workflow debug

    - name: Release workflow
      run: cmake --workflow default

    - name: install package
      run: cmake --install build

    - name: example workflow
      run: cmake --workflow default
      working-directory: example


  wsl:
    runs-on: windows-latest
    timeout-minutes: 10

    defaults:
      run:
        shell: wsl-bash {0}

    steps:

    - uses: Vampire/setup-wsl@v7
      with:
        distribution: Ubuntu-24.04
        additional-packages:
          cmake ninja-build gcc g++ gfortran
        use-cache: true
        wsl-shell-user: tester

    - name: tell OS release
      run: cat /etc/os-release

    - name: tell WSL version
      run: wsl.exe -l -v
      shell: pwsh

    - *checkout

    - run: >-
        cmake -B /tmp/build -G Ninja --preset default
        -Dffilesystem_cpp:BOOL=${{ matrix.cpp }}
        -Dffilesystem_fortran:BOOL=no

    - run: cmake --build /tmp/build

    - run: ctest --test-dir /tmp/build -V
