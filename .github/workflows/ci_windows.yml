name: ci_windows

on:
  push:
    paths:
      - "**.c"
      - "**.h"
      - "**.cpp"
      - "**.f90"
      - "**.F90"
      - "**/CMakeLists.txt"
      - "**.cmake"
      - ".github/workflows/ci_windows.yml"
      - "!memcheck.cmake"
  workflow_dispatch:

jobs:

  msvc:
    runs-on: windows-2025-vs2026
    timeout-minutes: 15

    # github actions generally broken for shared lib, even when exe in cwd

    steps:
    - &checkout
      uses: actions/checkout@v6

      # both work, save CI time

    # - name: C MSVC workflow
    #   run: cmake --workflow msvc-nostdfs

    # - name: C++23 workflow
    #   run: cmake --workflow cpp23 --fresh

    - name: C++20 Release
      run: cmake --workflow msvc --fresh

    - name: Install Release
      run: cmake --install build-msvc --config Release

    - name: example configure
      run: cmake --workflow msvc
      working-directory: example


  msys2:
    runs-on: windows-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        compiler: [ { ccname: "gcc", cc: "gcc", cxx: "g++", fcname: "gcc-fortran", fc: "gfortran" },]
                 #   { ccname: "clang", cc: "clang", cxx: "clang++", fcname: "flang", fc: "flang" } ]

      # github actions generally broken for shared lib, even when exe in cwd
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
      FC: ${{ matrix.compiler.fc }}

    steps:
    - uses: msys2/setup-msys2@v2
      id: msys2
      with:
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-${{ matrix.compiler.ccname }}
          mingw-w64-ucrt-x86_64-${{ matrix.compiler.fcname }}

    - name: Put MSYS2_MinGW64 on PATH
      run: echo "${{ steps.msys2.outputs.msys2-location }}/ucrt64/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - *checkout

    # both work, save CI time

    # - name: no std::filesystem workflow
    #   run: cmake --workflow nostdfs

    # - name: C++23 workflow
    #   run: cmake --workflow cpp23 --fresh

    - name: Release workflow
      run: cmake --workflow default --fresh

    - name: Upload log failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: gcc-${{ runner.os }}-CMakeConfigureLog.yaml
        path: build/CMakeFiles/CMakeConfigureLog.yaml

    - name: install package
      run: cmake --install build

    - name: example workflow
      run: cmake --workflow default
      working-directory: example

