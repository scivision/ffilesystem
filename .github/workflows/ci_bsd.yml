name: bsd

on:
  push:
    paths:
      - "**.c"
      - "**.cpp"
      - ".github/workflows/ci_bsd.yml"


jobs:
  test:
    runs-on: ubuntu-latest

    name: FreeBSD Clang

    steps:

    - uses: actions/checkout@v7

    - name: Test in FreeBSD
      uses: vmactions/freebsd-vm@v1
      with:
        prepare: pkg install -y cmake gcc13

        run: cmake --workflow default
