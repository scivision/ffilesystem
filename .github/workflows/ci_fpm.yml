name: ci_fpm

on:
  push:
    paths:
      - "fpm.toml"
      - ".github/workflows/ci_fpm.yml"

env:
  FPM_CXXFLAGS: -std=c++17


jobs:

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:

    - uses: fortran-lang/setup-fpm@v10
      with:
        fpm-version: "current"

    - uses: actions/checkout@v6

    - run: fpm build
